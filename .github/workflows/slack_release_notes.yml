name: Notify Slack on Latest Release
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
        
      - name: Install dependencies
        run: |
          pip install -r .github/workflows/requirements/notify-slack.txt

      - name: Fetch release info
        id: get_release
        env:
          RELEASE_JSON: ${{ toJSON(github.event.release) }}
        run: |
          echo "🔍 Getting release info..."
          echo "$RELEASE_JSON" | jq '{name, html_url, body}' > release.json

          jq -r .name release.json     > /tmp/release_name.txt
          jq -r .html_url release.json > /tmp/release_url.txt
          jq -r .body release.json     > /tmp/release_body.txt

      - name: Print resolved values (debug)
        if: runner.debug == '1'
        run: |
          echo "RELEASE_NAME: $(cat /tmp/release_name.txt)"
          echo "RELEASE_URL: $(cat /tmp/release_url.txt)"
          echo "RELEASE_BODY:"
          cat /tmp/release_body.txt

      - name: Send release info to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'EOF'
          import os
          from slack_sdk.webhook import WebhookClient
          from markdown2slack.app import Convert

          release_name = open("/tmp/release_name.txt").read().strip()
          release_url  = open("/tmp/release_url.txt").read().strip()
          release_body = open("/tmp/release_body.txt").read().strip()

          converter = Convert()
          webhook = WebhookClient(os.environ['SLACK_WEBHOOK_URL'])
          slack_formatted = converter.markdown_to_slack_format(release_body)

          response = webhook.send(
              text=f"New release published: {release_name}",
              blocks=[
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*New EDU Release:* <{release_url}|{release_name}>"
                      }
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": slack_formatted
                      }
                  }
              ]
          )
          print(f"Response: {response.status_code}")
          EOF

      - name: Cleanup temp files
        if: always()
        run: rm -f /tmp/release_name.txt /tmp/release_url.txt /tmp/release_body.txt
