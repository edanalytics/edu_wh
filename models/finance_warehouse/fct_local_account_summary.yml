version: 2

models:
  - name: fct_local_account_summary
    config:
      tags: ['finance']
    description: >
      Wide summary table — one row per local account. Joins dim_local_account to
      dim_chart_of_account for dimension context, then pulls in the latest actual and
      budget amounts from the snapshot fact tables. Intended for exploratory analysis
      and dashboarding where all account context is needed in one place.
    columns:
      - name: k_local_account
        description: Primary key — matches dim_local_account.k_local_account
        tests:
          - unique
          - not_null
      - name: k_chart_of_account
        description: Foreign key to dim_chart_of_account
      - name: k_lea
        description: Foreign key to dim_local_education_agencies (null if account belongs to a school)
      - name: k_school
        description: Foreign key to dim_schools (null if account belongs to an LEA)
      - name: tenant_code
        description: Data owner identifier
      - name: local_account_identifier
        description: Local account identifier
      - name: fiscal_year
        description: Fiscal year of the local account
      - name: ed_org_id
        description: Education organization id
      - name: ed_org_type
        description: Education organization type (School or LocalEducationAgency)
      - name: local_account_name
        description: Display name of the local account
      - name: chart_of_account_identifier
        description: Chart of accounts identifier from the linked chart of account
      - name: account_type
        description: Account type from the chart of accounts
      - name: actual_amount
        description: Dollar amount from the most recent actual snapshot (null if no actuals)
      - name: actual_as_of_date
        description: As-of date of the most recent actual snapshot
      - name: actual_financial_collection
        description: Financial collection descriptor on the most recent actual snapshot
      - name: budget_amount
        description: Dollar amount from the most recent budget snapshot (null if no budgets)
      - name: budget_as_of_date
        description: As-of date of the most recent budget snapshot
      - name: budget_financial_collection
        description: Financial collection descriptor on the most recent budget snapshot
