version: 2

models:
  - name: dim_local_account
    config:
      tags: ['finance']
    description: >
      Local account dimension — one row per k_local_account. Carries tenant and identity/value
      fields from staging (excluding JSON reference columns), v_reporting_tags, and Ed-Fi
      extension columns via extract_extension. Join to dim_chart_of_account via
      k_chart_of_account for dimension codes and display names.
    columns:
      - name: k_local_account
        description: Primary key — matches stg_ef3__local_accounts.k_local_account
        tests:
          - unique
          - not_null
