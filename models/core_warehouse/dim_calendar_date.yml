version: 2

models:
  - name: dim_calendar_date
    description: >
      ##### Overview: 
        Calendar dates as defined for a particular calendar at a particular school,
        along with some slicing variables for ordering and grouping time.

      ##### Primary Key:
        `k_calendar_date` - There is one record per individual day in a single calendar at a single school.

    config:
      tags: ['core']
    columns:
      - name: k_calendar_date
        description: >
          Generated primary key for an individual day in a single calendar
          at a single school.
        tests:
          - unique
      - name: k_school_calendar
        description: Association to a single named calendar at a school.
      - name: k_school
        description: Association to a single school
      - name: tenant_code
      - name: calendar_code
        description: Descriptive label for a calendar
      - name: school_year
        description: > 
          School year specified by Spring year,
          e.g. the 2021-2022 year would be 2022.
      - name: calendar_date
      - name: calendar_event
        description: A descriptor code for types of days within a school calendar
      - name: calendar_events_array
        description: The list of events for this day, if there are multiple.
      - name: is_school_day
        description: Is this an instructional day?
      - name: day_of_school_year
        description: Counting across instructional days
      - name: week_day
        description: Labeled day of the week
      - name: week_of_calendar_year
        description: Counting across calendar weeks
      - name: week_of_school_year
        description: Counting across weeks of the school year

semantic_models:
  - name: dim_calendar_date
    description: >
      Calendar dates by school calendar. Provides time-based attributes for
      attendance and other date-based analysis.
    model: ref('dim_calendar_date')
    defaults:
      agg_time_dimension: calendar_date

    entities:
      - name: calendar_date_key
        type: primary
        expr: k_calendar_date
      - name: school
        type: foreign
        expr: k_school
      - name: school_calendar
        type: foreign
        expr: k_school_calendar

    dimensions:
      - name: calendar_date
        type: time
        description: The calendar date
        type_params:
          time_granularity: day
        expr: calendar_date
      - name: school_year
        type: categorical
        description: School year by ending year
        expr: school_year
      - name: calendar_code
        type: categorical
        description: Descriptive label for the calendar
        expr: calendar_code
      - name: calendar_event
        type: categorical
        description: Descriptor for type of day (Instructional day, Non-instructional day)
        expr: calendar_event
      - name: is_school_day
        type: categorical
        description: Whether this is an instructional day
        expr: is_school_day
      - name: week_day
        type: categorical
        description: Day of week (Mon, Tue, Wed, etc.)
        expr: week_day
      - name: tenant_code
        type: categorical
        expr: tenant_code

    measures:
      - name: day_of_school_year
        description: The instructional day number within the school year
        agg: max
        expr: day_of_school_year
      - name: week_of_school_year
        description: Week number within the school year
        agg: max
        expr: week_of_school_year
      - name: week_of_calendar_year
        description: Week number within the calendar year
        agg: max
        expr: week_of_calendar_year
      - name: school_day_count
        description: Count of school days (is_school_day = true)
        agg: sum
        expr: "case when is_school_day then 1 else 0 end"
      