version: 2

models:
  - name: fct_student_school_food_service_program_associations
    description: >
      ##### Overview:
        This fact table contains student food service program enrollment information.

      ##### Primary Key:
        `k_student, k_program, program_enroll_begin_date` -- There 
        is one record per student, year, program enrol begin date, and food service program.

    config:
      tags: ['food_service']
      enabled: "{{ var('src:program:food_service:enabled', True) }}"

    constraints:
      - type: primary_key
        columns: [k_student, k_program, program_enroll_begin_date]
      - type: foreign_key
        name: fk__fct_student_school_food_service_program_associations__k_student
        columns: [k_student]
        to: ref('dim_student')
        to_columns: [k_student]
      - type: foreign_key
        name: fk__fct_student_school_food_service_program_associations__k_program
        columns: [k_program]
        to: ref('dim_program')
        to_columns: [k_program]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - k_student
              - k_program
              - program_enroll_begin_date

    columns:
      - name: k_student
      - name: k_student_xyear
      - name: k_program
      - name: k_lea
      - name: k_school
      - name: tenant_code
      - name: school_year
      - name: program_enroll_begin_date
      - name: program_enroll_end_date
      - name: direct_certification
      - name: served_outside_of_regular_session