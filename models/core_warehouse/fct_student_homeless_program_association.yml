version: 2

models:
  - name: fct_student_homeless_program_association
    description: >
      ##### Overview:
        This fact table contains student homeless program enrollment information.

      ##### Primary Key:
        `k_student_program` -- There is one record per student, year, program, ed org, and program enrollment begin date.

    config:
      tags: ['homeless']
      enabled: "{{ var('src:program:homeless:enabled', True) }}"

    constraints:
      - type: primary_key
        columns: [k_student_program]
      - type: foreign_key
        name: fk__fct_student_homeless_program_association__k_student
        columns: [k_student]
        to: ref('dim_student')
        to_columns: [k_student]
      - type: foreign_key
        name: fk__fct_student_homeless_program_association__k_program
        columns: [k_program]
        to: ref('dim_program')
        to_columns: [k_program]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - k_student_program

    columns:
      - name: k_student_program
      - name: k_student
      - name: k_student_xyear
      - name: k_program
      - name: k_lea
      - name: k_school
      - name: tenant_code
      - name: school_year
      - name: program_enroll_begin_date
      - name: program_enroll_end_date
      - name: is_awaiting_foster_care
      - name: is_homeless_unaccompanied_youth
      - name: homeless_primary_nighttime_residence
      - name: is_served_outside_regular_session
      - name: participation_status
      - name: participation_status_designated_by
      - name: participation_status_begin_date
      - name: participation_status_end_date
      - name: reason_exited
