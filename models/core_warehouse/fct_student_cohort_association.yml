version: 2

models:
  - name: fct_student_cohort_association
    description: >
      ##### Overview:
        Student cohort enrollment information.

      ##### Primary Key:
        `k_student, k_cohort, cohort_begin_date`

    config:
      tags: ['cohort']
      enabled: "{{ var('src:domain:cohort:enabled', True) }}"

    constraints:
      - type: primary_key
        columns: [k_student, k_cohort, cohort_begin_date]
      - type: foreign_key
        name: fk__fct_student_cohort_association__k_student
        columns: [k_student]
        to: ref('dim_student')
        to_columns: [k_student]
      - type: foreign_key
        name: fk__fct_student_cohort_association__k_cohort
        columns: [k_cohort]
        to: ref('dim_cohort')
        to_columns: [k_cohort]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - k_student
              - k_cohort
              - cohort_begin_date
    columns:
      - name: k_student
      - name: k_student_xyear
      - name: k_cohort
      - name: k_lea
      - name: k_school
      - name: tenant_code
      - name: school_year
      - name: cohort_begin_date
      - name: cohort_end_date
      - name: is_active_cohort_association