version: 2

models: 
  - name: fct_student_school_attendance_event
    description: >
      ##### Overview:
        Defines student-school-level attendance events.

        Since attendance is generally recorded only in the negative, this is 
        typically a table of absences only. To find full daily attendance records,
        see `fct_student_daily_attendance` or the aggregations thereof.


      ##### Primary Key:
        `k_student, k_school, k_calendar_date, k_session, attendance_event_category`

    config:
      tags: ['core']

    constraints:
      - type: primary_key
        columns: [k_student, k_school, k_session, attendance_event_category, k_calendar_date]
      - type: foreign_key
        name: fk__fct_student_school_attendance_event__k_student
        columns: [k_student]
        to: ref('dim_student')
        to_columns: [k_student]
      - type: foreign_key
        name: fk__fct_student_school_attendance_event__k_school
        columns: [k_school]
        to: ref('dim_school')
        to_columns: [k_school]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - k_student
              - k_school
              - k_calendar_date
              - k_session
              - attendance_event_category
    columns:
      - name: k_student
      - name: k_student_xyear
      - name: k_school
      - name: k_calendar_date
      - name: calendar_date
      - name: k_session
      - name: tenant_code
      - name: school_year
      - name: attendance_event_category
      - name: attendance_event_reason
      - name: is_absent
      - name: event_duration
      - name: arrival_time
      - name: departure_time
      - name: educational_environment
      - name: attendance_excusal_status
  